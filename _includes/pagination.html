<nav class="pagination">
  {% if paginator.previous_page %}
  <a href="{{ paginator.previous_page_path | relative_url }}" class="page-btn">&larr;</a>
  {% endif %}

  {% for page in (1..paginator.total_pages) %}
    {% if page == paginator.page %}
    <span class="page-btn active">{{ page }}</span>
    {% elsif page == 1 %}
    <a href="{{ '/' | relative_url }}" class="page-btn">{{ page }}</a>
    {% else %}
    <a href="/page{{ page }}/" class="page-btn">{{ page }}</a>
    {% endif %}
  {% endfor %}

  {% if paginator.next_page %}
  <a href="{{ paginator.next_page_path | relative_url }}" class="page-btn">&rarr;</a>
  {% endif %}
</nav>
