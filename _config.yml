# Site settings
title: 湖畔
tagline: "你消磨了岁月，岁月也消磨了你。你至今未能写出诗"
description: >-
  一个存放文字的地方——随笔、日常、与未完成的故事。
author: 诗心
email: ""

# URLs
url: "https://theRiverran.github.io"
baseurl: "/back-to-the-lake"
permalink: /:year/:month/:day/:title/

# Logo (optional — set to a path like /assets/images/logo.svg)
logo: ""

# Social links
social:
  github: "theRiverran"
  twitter: ""
  linkedin: ""

# Pagination
paginate: 5
paginate_path: "/page:num/"

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - vendor/

# Default front matter
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      sidebar: true
  - scope:
      path: ""
      type: pages
    values:
      layout: page
      sidebar: true
  - scope:
      path: "pages/about.md"
    values:
      sidebar: false

# Kramdown settings
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Footer about text
footer_about: "湖畔 — 一个存放文字的地方。用 Jekyll 构建，部署于 GitHub Pages。"
